<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Founder monogram">
  <!-- Placeholder monogram. To use a real headshot instead, drop a square
       image at assets/founder.jpg and point the <img> in about.html to it. -->
  <defs>
    <radialGradient id="fg" cx="38%" cy="32%" r="80%">
      <stop offset="0" stop-color="#1B1F26"/>
      <stop offset="1" stop-color="#101319"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" fill="url(#fg)"/>
  <g fill="none" stroke="#D6A24A" stroke-opacity="0.30" stroke-width="1">
    <circle cx="50" cy="50" r="30"/>
    <circle cx="50" cy="50" r="44"/>
  </g>
  <text x="50" y="50" dy="0.36em" text-anchor="middle"
        font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="34"
        font-weight="600" letter-spacing="1" fill="#E9EAEC">AA</text>
</svg>
