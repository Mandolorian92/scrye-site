<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" role="img" aria-label="Stylized operating picture: a map with confidence-graded zones, a planned route, scale, and a confidence readout">
  <defs>
    <linearGradient id="opbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C0E12"/>
      <stop offset="1" stop-color="#090A0D"/>
    </linearGradient>
  </defs>

  <rect width="760" height="480" fill="url(#opbg)"/>

  <!-- map grid -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <path d="M130 24 V456 M250 24 V456 M380 24 V456 M510 24 V456 M630 24 V456"/>
    <path d="M24 120 H736 M24 220 H736 M24 320 H736 M24 400 H736"/>
  </g>

  <!-- contour clusters -->
  <g fill="none" stroke="#D6A24A" stroke-opacity="0.13" stroke-width="1">
    <ellipse cx="250" cy="300" rx="28" ry="22"/>
    <ellipse cx="246" cy="296" rx="60" ry="48"/>
    <ellipse cx="256" cy="304" rx="98" ry="78"/>
    <ellipse cx="242" cy="292" rx="140" ry="112"/>
    <ellipse cx="560" cy="172" rx="24" ry="18"/>
    <ellipse cx="556" cy="168" rx="52" ry="40"/>
    <ellipse cx="566" cy="176" rx="86" ry="66"/>
  </g>

  <!-- planned route -->
  <path d="M120 430 L300 300 L520 200" fill="none" stroke="#D6A24A" stroke-opacity="0.55" stroke-width="1.4" stroke-dasharray="6 6"/>
  <g fill="#E7B65E">
    <path d="M120 424 L126 430 L120 436 L114 430 Z"/>
    <path d="M300 294 L306 300 L300 306 L294 300 Z"/>
    <path d="M520 194 L526 200 L520 206 L514 200 Z"/>
  </g>

  <!-- zone: GO (green) -->
  <g>
    <circle cx="250" cy="300" r="44" fill="#46B17B" fill-opacity="0.06"/>
    <circle cx="250" cy="300" r="34" fill="#46B17B" fill-opacity="0.16"/>
    <circle cx="250" cy="300" r="34" fill="none" stroke="#46B17B" stroke-opacity="0.75" stroke-width="1.4"/>
    <circle cx="250" cy="300" r="3" fill="#46B17B"/>
  </g>

  <!-- zone: CAUTION (amber) -->
  <g>
    <circle cx="470" cy="332" r="26" fill="#D6A24A" fill-opacity="0.16"/>
    <circle cx="470" cy="332" r="26" fill="none" stroke="#D6A24A" stroke-opacity="0.8" stroke-width="1.4"/>
    <circle cx="470" cy="332" r="3" fill="#D6A24A"/>
  </g>

  <!-- zone: NO-GO (red) -->
  <g>
    <circle cx="592" cy="184" r="22" fill="#C85C45" fill-opacity="0.16"/>
    <circle cx="592" cy="184" r="22" fill="none" stroke="#C85C45" stroke-opacity="0.8" stroke-width="1.4"/>
    <path d="M584 176 L600 192 M600 176 L584 192" stroke="#C85C45" stroke-opacity="0.85" stroke-width="1.4"/>
  </g>

  <!-- center reticle -->
  <g stroke="#D6A24A" stroke-opacity="0.4" stroke-width="1" fill="none">
    <circle cx="380" cy="262" r="10"/>
    <path d="M380 246 V256 M380 268 V278 M364 262 H374 M386 262 H396"/>
  </g>

  <!-- north arrow -->
  <g>
    <path d="M698 52 L703 70 L698 65 L693 70 Z" fill="#D6A24A"/>
    <text x="698" y="84" text-anchor="middle" font-family="Consolas, ui-monospace, monospace" font-size="11" fill="#D6A24A" fill-opacity="0.8">N</text>
  </g>

  <!-- scale bar -->
  <g>
    <path d="M40 444 H140" stroke="#9AA0A8" stroke-opacity="0.7" stroke-width="1.4"/>
    <path d="M40 440 V448 M90 442 V446 M140 440 V448" stroke="#9AA0A8" stroke-opacity="0.7" stroke-width="1.4"/>
    <text x="40" y="436" font-family="Consolas, ui-monospace, monospace" font-size="10" letter-spacing="1" fill="#80868F">1 KM</text>
  </g>

  <!-- confidence readout -->
  <g>
    <text x="612" y="430" font-family="Consolas, ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#80868F">CONFIDENCE</text>
    <rect x="612" y="438" width="36" height="7" fill="#C85C45" fill-opacity="0.85"/>
    <rect x="648" y="438" width="36" height="7" fill="#D6A24A" fill-opacity="0.9"/>
    <rect x="684" y="438" width="36" height="7" fill="#46B17B" fill-opacity="0.9"/>
    <path d="M702 433 L707 433 L704.5 438 Z" fill="#E9EAEC"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#D6A24A" stroke-opacity="0.55" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M20 52 L20 20 L52 20"/>
    <path d="M708 20 L740 20 L740 52"/>
    <path d="M20 428 L20 460 L52 460"/>
    <path d="M740 428 L740 460 L708 460"/>
  </g>
</svg>
