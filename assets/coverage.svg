<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Abstract sensor coverage and scan grid">
  <defs>
    <radialGradient id="cvfade" cx="50%" cy="50%" r="50%">
      <stop offset="0"   stop-color="#fff" stop-opacity="1"/>
      <stop offset="0.7" stop-color="#fff" stop-opacity="1"/>
      <stop offset="1"   stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="cvmask"><rect width="600" height="600" fill="url(#cvfade)"/></mask>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D6A24A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D6A24A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="#0F1115"/>

  <g mask="url(#cvmask)">
    <!-- graticule -->
    <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
      <path d="M0 150 H600 M0 300 H600 M0 450 H600"/>
      <path d="M150 0 V600 M300 0 V600 M450 0 V600"/>
    </g>

    <!-- sweep wedge -->
    <path d="M300 300 L300 40 A260 260 0 0 1 540 220 Z" fill="url(#sweep)"/>

    <!-- range rings -->
    <g fill="none" stroke="#D6A24A" stroke-opacity="0.5" stroke-width="1.1">
      <circle cx="300" cy="300" r="70"/>
      <circle cx="300" cy="300" r="140"/>
      <circle cx="300" cy="300" r="210"/>
      <circle cx="300" cy="300" r="270"/>
    </g>

    <!-- radial spokes -->
    <g stroke="#D6A24A" stroke-opacity="0.22" stroke-width="1">
      <path d="M300 300 L300 30"/>
      <path d="M300 300 L570 300"/>
      <path d="M300 300 L300 570"/>
      <path d="M300 300 L30 300"/>
      <path d="M300 300 L491 109"/>
      <path d="M300 300 L491 491"/>
      <path d="M300 300 L109 491"/>
      <path d="M300 300 L109 109"/>
    </g>

    <!-- center -->
    <circle cx="300" cy="300" r="4" fill="#E7B65E"/>
    <circle cx="300" cy="300" r="9" fill="none" stroke="#E7B65E" stroke-opacity="0.6"/>

    <!-- nodes -->
    <g fill="#D6A24A">
      <circle cx="392" cy="208" r="3.4"/>
      <circle cx="208" cy="388" r="3.4"/>
      <circle cx="430" cy="372" r="3"/>
      <circle cx="186" cy="208" r="2.6"/>
      <circle cx="356" cy="468" r="2.6"/>
    </g>
    <g fill="none" stroke="#D6A24A" stroke-opacity="0.35" stroke-width="1">
      <circle cx="392" cy="208" r="9"/>
      <circle cx="208" cy="388" r="9"/>
    </g>
  </g>
</svg>
